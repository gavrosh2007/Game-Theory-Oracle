<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Теория игр - Нет соединения</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #F48D01;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .offline-container {
            text-align: center;
            max-width: 500px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid #b0d9b1;
        }
        .offline-icon { font-size: 5rem; margin-bottom: 1rem; }
        h1 { color: #b0d9b1; font-size: 2rem; margin-bottom: 1rem; }
        p { color: #ffffff; font-size: 1.2rem; margin-bottom: 2rem; line-height: 1.5; }
        .retry-btn {
            background: #b0d9b1;
            color: #000000;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .retry-btn:hover { background: #000000; color: #b0d9b1; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Нет соединения</h1>
        <p>Проверьте подключение к интернету.<br>Как только связь восстановится, приложение продолжит работу.</p>
        <button class="retry-btn" onclick="location.reload()">⟳ Попробовать снова</button>
    </div>
    <script>
        setInterval(() => { if (navigator.onLine) location.reload(); }, 5000);
    </script>
</body>
</html>
