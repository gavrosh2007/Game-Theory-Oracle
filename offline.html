<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Теория игр - Нет соединения</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #F48D01;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .offline-container {
            text-align: center;
            max-width: 500px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid #b0d9b1;
        }
        .offline-icon { font-size: 5rem; margin-bottom: 1rem; }
        h1 { color: #b0d9b1; font-size: 2rem; margin-bottom: 1rem; }
        p { color: #ffffff; font-size: 1.2rem; margin-bottom: 2rem; line-height: 1.5; }
        .retry-btn {
            background: #b0d9b1;
            color: #000000;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .retry-btn:hover { background: #000000; color: #b0d9b1; }
        .contacts {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(176,217,177,0.3);
        }
        .contacts a {
            color: #b0d9b1;
            text-decoration: none;
            display: inline-block;
            margin: 0.5rem;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .contacts a:hover { opacity: 0.8; text-decoration: underline; }
        .check-status {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Нет соединения</h1>
        <p>Проверьте подключение к интернету.<br>Как только связь восстановится, приложение продолжит работу.</p>
        <button class="retry-btn" onclick="location.reload()">⟳ Попробовать снова</button>
        
        <div class="contacts">
            <a href="https://t.me/faufautua" target="_blank">📱 Telegram</a>
            <a href="mailto:gavrosh2007@gmail.com">✉️ Email</a>
        </div>
        <div class="check-status" id="statusCheck">⏳ Проверка соединения...</div>
    </div>

    <script>
        const statusDiv = document.getElementById('statusCheck');
        let checkCount = 0;
        
        const interval = setInterval(() => {
            checkCount++;
            if (navigator.onLine) {
                statusDiv.innerHTML = '✅ Соединение восстановлено! Перезагрузка...';
                clearInterval(interval);
                setTimeout(() => location.reload(), 500);
            } else {
                statusDiv.innerHTML = `⏳ Нет соединения... проверка ${checkCount}`;
            }
        }, 3000);
    </script>
</body>
</html>
